<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - {{ title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .settings-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .device-row {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            margin-bottom: 0.75rem;
        }

        select[multiple] {
            height: 150px !important;
        }
    </style>
</head>

<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="width: 40px;"></div>
            <h1>Settings</h1>
            <div style="width: 40px; text-align: right;">
                <a href="{{ url_for('web.index') }}" style="color: var(--text-main);"><i class="fas fa-home"></i></a>
            </div>
        </div>
    </header>

    <main class="container">
        <form method="POST" class="settings-card">
            <h3 style="margin-bottom: 1.5rem; color: var(--primary);">General Configuration</h3>

            {% for key, value in config.items() %}
            {% if key not in ['devices', 'schedules', 'exclude_from_all', 'api_key'] %}
            <div class="form-group">
                <label for="{{ key }}">{{ key|replace('_', ' ')|title }}</label>
                <input type="text" id="{{ key }}" name="{{ key }}" value="{{ value }}">
            </div>
            {% endif %}
            {% endfor %}

            <div class="form-group">
                <label>API Key (For External Access)</label>
                <div style="display: flex; gap: 1rem;">
                    <input type="text" value="{{ config.get('api_key', 'Not Set') }}" readonly
                        style="flex-grow: 1; opacity: 0.7;">
                    <button type="button" class="toggle-btn" style="width: auto; padding: 0 1rem;"
                        onclick="navigator.clipboard.writeText('{{ config.get('api_key') }}').then(() => alert('Copied!'))">Copy</button>
                </div>
            </div>

            <h3 style="margin-bottom: 1.5rem; color: var(--primary); margin-top: 2rem;">Device Management</h3>
            {% if devices %}
            <div class="form-group">
                <label>Exclude from "All On/Off"</label>
                <select name="exclude_from_all" multiple>
                    {% for device in devices %}
                    <option value="{{ device.id }}" {% if device.id in config.get('exclude_from_all', []) %}selected{%
                        endif %}>
                        {{ device.solution }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <label style="font-size: 0.875rem; color: var(--text-dim); text-transform: uppercase;">Alias
                Configuration</label>
            <div style="margin-top: 1rem;">
                {% for device in devices %}
                <div class="device-row">
                    <span style="font-size: 0.875rem; color: var(--text-dim);">{{ device.name }}</span>
                    <input type="text" name="device_solution_{{ loop.index0 }}" value="{{ device.solution }}"
                        style="margin-bottom: 0 !important;">
                    <a href="{{ url_for('web.delete_device', pk=device.id) }}" class="toggle-btn"
                        style="background: var(--danger); width: 40px;" onclick="return confirm('Delete device?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <div style="margin-top: 2rem; display: flex; justify-content: center;">
                <button type="submit" class="toggle-btn"
                    style="background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; width: auto; padding: 1rem 4rem;">
                    Save All Changes
                </button>
            </div>
        </form>
    </main>
</body>

</html>
