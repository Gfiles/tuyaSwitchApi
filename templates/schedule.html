<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - {{ title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .schedule-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.5rem;
        }

        select[multiple] {
            height: 100px !important;
        }
    </style>
    <script>
        let counter = {{ schedules| length }};
        function addSchedule() {
            const container = document.getElementById('schedules-container');
            const div = document.createElement('div');
            div.className = 'schedule-card';
            div.innerHTML = `
                <input type="hidden" name="schedule_id" value="">
                <div class="form-group">
                    <label>Schedule Name</label>
                    <input type="text" name="schedule_name" required placeholder="Daily On">
                </div>
                <div class="form-group">
                    <label>Action</label>
                    <select name="schedule_action" required>
                        <option value="on">Turn ON</option>
                        <option value="off">Turn OFF</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Days</label>
                    <select name="schedule_days_${counter}" multiple required>
                        <option value="mon">Monday</option><option value="tue">Tuesday</option>
                        <option value="wed">Wednesday</option><option value="thu">Thursday</option>
                        <option value="fri">Friday</option><option value="sat">Saturday</option>
                        <option value="sun">Sunday</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" name="schedule_time" required>
                </div>
                <div class="form-group">
                    <label>Devices</label>
                    <select name="schedule_devices_${counter}" multiple required>
                        {% for device in devices %}
                            <option value="{{ device.id }}">{{ device.solution }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="button" class="toggle-btn" style="background: var(--danger);" onclick="this.parentElement.remove()">Remove</button>
            `;
            container.appendChild(div);
            counter++;
        }
    </script>
</head>

<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="width: 40px;"></div>
            <h1>Schedules</h1>
            <div style="width: 40px; text-align: right;">
                <a href="{{ url_for('web.index') }}" style="color: var(--text-main);"><i class="fas fa-home"></i></a>
            </div>
        </div>
    </header>

    <main class="container">
        <form method="POST">
            <div id="schedules-container" class="schedule-grid">
                {% for schedule in schedules %}
                <div class="schedule-card">
                    <input type="hidden" name="schedule_id" value="{{ schedule.id }}">
                    <div class="form-group">
                        <label>Schedule Name</label>
                        <input type="text" name="schedule_name" value="{{ schedule.name }}" required>
                    </div>
                    <div class="form-group">
                        <label>Action</label>
                        <select name="schedule_action" required>
                            <option value="on" {% if schedule.action=='on' %}selected{% endif %}>Turn ON</option>
                            <option value="off" {% if schedule.action=='off' %}selected{% endif %}>Turn OFF</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Days</label>
                        <select name="schedule_days_{{ loop.index0 }}" multiple required>
                            {% for code, day in [('mon','Monday'), ('tue','Tuesday'), ('wed','Wednesday'),
                            ('thu','Thursday'), ('fri','Friday'), ('sat','Saturday'), ('sun','Sunday')] %}
                            <option value="{{ code }}" {% if code in schedule.days %}selected{% endif %}>{{ day }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" name="schedule_time" value="{{ schedule.time }}" required>
                    </div>
                    <div class="form-group">
                        <label>Devices</label>
                        <select name="schedule_devices_{{ loop.index0 }}" multiple required>
                            {% for device in devices %}
                            <option value="{{ device.id }}" {% if device.id in schedule.devices %}selected{% endif %}>{{
                                device.solution }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="button" class="toggle-btn" style="background: var(--danger);"
                        onclick="this.parentElement.remove()">Remove</button>
                </div>
                {% endfor %}
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button type="button" class="toggle-btn"
                    style="background: var(--success); width: auto; padding: 1rem 3rem;" onclick="addSchedule()">Add New
                    Schedule</button>
                <button type="submit" class="toggle-btn"
                    style="background: var(--primary); color: var(--bg-dark); width: auto; padding: 1rem 3rem;">Save
                    Schedules</button>
            </div>
        </form>
    </main>
</body>

</html>
